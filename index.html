<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Forge — a personal training plan: today's session, your weekly split, and the approach." />
  <title>Forge — Training</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <main id="view" class="view" role="main"></main>

    <nav class="bottomnav" id="bottomnav" role="navigation" aria-label="Primary">
      <a href="#/" data-route="/" class="navitem" aria-label="Today">
        <span class="navicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="4.5" width="15" height="16" rx="3.5"/><path d="M8.5 4.5V4A1.6 1.6 0 0 1 10.1 2.4h3.8A1.6 1.6 0 0 1 15.5 4v.5"/><path d="M8.7 12.2l1.8 1.8 3.6-3.8"/><path d="M8.6 16.6h6.8"/></svg></span></a>
      <a href="#/week" data-route="/week" class="navitem" aria-label="Week">
        <span class="navicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.8" y="5.3" width="16.4" height="14.9" rx="3.2"/><path d="M3.8 9.8h16.4"/><path d="M8.4 3.4v3.6M15.6 3.4v3.6"/></svg></span></a>
      <a href="#/calendar" data-route="/calendar" class="navitem" aria-label="Streak">
        <span class="navicon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13.4 2.3c.8 2.9-.9 4.7-2.1 6-1 1.2-2 2.4-2 4.2 0 1 .4 1.9 1.1 2.5-2.2-.3-3.6-2.2-3.6-2.2C5.6 14.3 5 16.1 5 17.6 5 20.6 8.1 23 12 23s7-2.4 7-5.4c0-3.4-2.4-5.6-3.7-7.3-.6 1.3-1.6 1.7-2.4 1.2C11.4 10 14.3 6.6 13.4 2.3Z"/></svg></span></a>
      <a href="#/habits" data-route="/habits" class="navitem" aria-label="Add habit">
        <span class="navicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.4"/><path d="M12 8.4v7.2M8.4 12h7.2"/></svg></span></a>
      <a href="#/approach" data-route="/approach" class="navitem" aria-label="Approach">
        <span class="navicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.6C9.8 5 6.6 5 4.5 5.8v12.5c2.1-.8 5.3-.8 7.5.9 2.2-1.7 5.4-1.7 7.5-.9V5.8C17.4 5 14.2 5 12 6.6Z"/><path d="M12 6.6v12.6"/></svg></span></a>
    </nav>
  </div>

  <script src="js/data.js" defer></script>
  <script src="js/svg.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
